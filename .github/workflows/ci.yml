name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile || bun install

      - name: Type check
        run: bun run --filter '*' build || echo "build placeholders OK"

      - name: Smoke run
        run: bun packages/cli/src/index.ts
