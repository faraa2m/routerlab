name: Release

# Changesets-driven release pipeline for the routerlab monorepo.
#
# Flow:
#   1. Contributors add `.changeset/*.md` files (via `bun run changeset`)
#      describing each user-visible change and its semver bump.
#   2. When changesets land on `main`, this workflow opens (or updates)
#      a "Version Packages" PR that applies the pending changesets:
#      bumps every affected workspace's `package.json#version`, rewrites
#      `CHANGELOG.md` files, and deletes the consumed changeset md files.
#   3. Merging the Version Packages PR re-runs this workflow. With no
#      pending changesets, the action falls through to `publish`, which
#      runs `bun run changeset:publish` â€” that script builds, then calls
#      `changeset publish` which packs+publishes each workspace tarball
#      to npm AND creates a GitHub Release per tag.
#
# Replaces the prior `publish.yml` (release-triggered). Changesets owns
# both release creation and npm publishing now; keeping a second
# publish-on-release workflow would race and fail with EPUBLISHCONFLICT.
#
# Auth: npm Trusted Publisher (OIDC). No long-lived npm secret.
#   At publish time, `actions/setup-node` plus the `id-token: write`
#   permission lets `npm publish` exchange GitHub's OIDC token for a
#   short-lived npm publish credential. npm's registry validates the
#   token's `repository` + `workflow` claims against the Trusted Publisher
#   binding configured for each package, then issues a one-shot publish
#   credential.
#
#   Per-package binding: npm Trusted Publishers are configured per
#   package, NOT per org. Both @routerlab/core AND @routerlab/cli must
#   have an active Trusted Publisher binding pointing at
#   faraa2m/routerlab + .github/workflows/release.yml, or `changeset
#   publish` will fail on the unbound package. Bindings are created in
#   the npm UI: package page â†’ Settings â†’ Publishing access â†’ Add
#   trusted publisher.
#
# Provenance: the same OIDC token that authenticates the publish also
# signs each tarball's provenance attestation. `NPM_CONFIG_PROVENANCE=true`
# forces `--provenance` on every `npm publish` invocation so the
# attestation lands on the npm registry alongside the tarball.
#
# Required secrets:
#   * GITHUB_TOKEN â€” provided by Actions, used for PR creation and tag pushes.
#                    npm publish auth flows through OIDC, see above.
#
# Setup prerequisites (one-time, out-of-band):
#   * npm Trusted Publisher binding for @routerlab/core pointing at this
#     repo (faraa2m/routerlab) + .github/workflows/release.yml.
#   * npm Trusted Publisher binding for @routerlab/cli  pointing at this
#     repo (faraa2m/routerlab) + .github/workflows/release.yml.
#     (Bindings are per-package, not per-org â€” both are required.)

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Open Version PR or publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so changesets can compute changelogs against the
          # last published tag.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to latest
        # Trusted Publisher OIDC token-exchange requires npm >= 11.5.1.
        # Keep npm current so OIDC publish auth and provenance support do
        # not depend on the runner image's bundled npm patch level.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        # MUST run before Test: @routerlab/cli imports from @routerlab/core
        # whose `package.json#main` points to `dist/index.js`. Same ordering
        # as the retired publish.yml.
        run: bun run --filter '*' build

      - name: Test
        run: bun test

      - name: Run changesets action
        id: changesets
        uses: changesets/action@v1
        with:
          # When changesets are pending, open/update the "Version Packages" PR.
          # When that PR is merged (no pending changesets), this action calls
          # the publish script which runs `changeset publish` to ship to npm
          # AND tags + creates the GitHub Release for each shipped package.
          version: bun run changeset:version
          publish: bun run changeset:publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `changeset publish` shells out to `npm publish`. Setting
          # NPM_CONFIG_PROVENANCE=true on the publish step ensures each
          # tarball carries the GitHub OIDC provenance attestation, matching
          # the guarantees the retired publish.yml provided.
          NPM_CONFIG_PROVENANCE: "true"
