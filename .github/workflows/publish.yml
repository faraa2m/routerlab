name: Publish

# Publish routerlab packages to npm with provenance attestations.
# Auth: NPM_TOKEN secret (classic granular token) — Trusted Publisher
# OIDC requires existing packages on npm to bind; until @routerlab/core +
# @routerlab/cli are first-published, the workflow uses NPM_TOKEN with
# `--provenance` for the attestation. After first publish, migrate to
# pure OIDC by registering a Trusted Publisher on npmjs.com (Settings →
# Organizations → @routerlab → Packages → Trusted Publishers) and
# deleting the NPM_TOKEN secret.
#
# Packages (publish in dependency order):
#   1. @routerlab/core@<version>  — engine, depends on @tokenometer/core
#   2. @routerlab/cli@<version>   — depends on @routerlab/core
#
# Triggers:
#   * release.published — Recommended. Cut a GitHub Release tagged
#     `v<version>` matching every workspace package's `package.json#version`.
#   * workflow_dispatch — Manual lever with optional `dry_run` input. When
#     `dry_run=true`, packs and validates but does NOT call `npm publish`
#     against the live registry.
#
# Setup prerequisites (one-time):
#   * GitHub repository secret `NPM_TOKEN` — granular access token scoped
#     to publish access on @routerlab packages, generated at
#     https://www.npmjs.com/settings/<your-user>/tokens → Generate New Token
#     → Granular Access Token.
#   * Optional: GitHub environment `npm` exists in repo settings if you
#     want a required-reviewer manual approval gate.
#   * Future: Trusted Publisher migration after first successful publish.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack + verify only, do not call `npm publish`."
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm (OIDC + provenance)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: npm
      url: https://www.npmjs.com/package/@routerlab/cli
    permissions:
      # OIDC token for Trusted Publisher exchange AND for provenance
      # attestation signing. Both require `id-token: write`.
      id-token: write
      # Reading the source tree to pack the tarballs.
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Match `ci.yml` which uses `latest`. Repo `bun.lock` is the
          # post-1.2 text-format lockfile; bun 1.1.0 only understands the
          # legacy binary lockb and would fail `--frozen-lockfile`.
          bun-version: latest

      - name: Setup Node (for `npm publish`)
        # We use bun for install + test + build, but `npm publish` is the
        # canonical publisher (provenance flag, OIDC token exchange).
        # Node 20+ is required for npm provenance.
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies (bun)
        run: bun install --frozen-lockfile

      - name: Build all packages
        # MUST run before Test: @routerlab/cli imports from @routerlab/core
        # whose `package.json#main` points to `dist/index.js`. The workspace
        # symlink resolves to `packages/core/`, but tests in the cli package
        # fail with `Cannot find module '@routerlab/core'` unless dist/ has
        # been built first. `bun run --filter '*' build` invokes
        # `tsc -p tsconfig.json` per workspace package.
        run: bun run --filter '*' build

      - name: Test
        # Real `bun test`, not the smoke fallback. Failing tests block publish.
        run: bun test

      - name: Normalize manifests (`npm pkg fix`)
        # Catches common manifest issues (bin permissions, repository field
        # shape, etc.) before npm rejects them at publish time.
        run: |
          npm pkg fix --workspaces || true

      - name: Show planned publish manifest
        # Dry-run pack each package, print the file list and tarball size.
        # Easy to scan for accidentally-included secrets or huge artifacts.
        run: |
          for pkg in packages/core packages/cli; do
            echo "=== $pkg ==="
            (cd "$pkg" && npm pack --dry-run --json) | tee
          done

      - name: Publish @routerlab/core
        # Provenance requires id-token:write (set above) and Node 20+.
        # NPM_TOKEN is consumed via NODE_AUTH_TOKEN (setup-node@v4 wires
        # the .npmrc auth header from this env var). Provenance attestation
        # signs with the GitHub OIDC token regardless of auth method.
        # Dependency order: @routerlab/core must publish before @routerlab/cli
        # can resolve it from the registry — npm publish on the CLI would
        # otherwise fall back to looking for `workspace:*` and fail.
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --access public --provenance --dry-run
          else
            npm publish --access public --provenance
          fi

      - name: Publish @routerlab/cli
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --access public --provenance --dry-run
          else
            npm publish --access public --provenance
          fi
